# ycm.home reverse proxy
#
# Proxies YCM Dashboard (host port 8010) to ycm.home
#
# Enable:
#   sudo ln -s /home/jh/docker/ycm-dashboard/nginx/ycm.conf /etc/nginx/sites-available/ycm
#   sudo ln -s /etc/nginx/sites-available/ycm /etc/nginx/sites-enabled/ycm
#   sudo nginx -t && sudo systemctl reload nginx

server {
  listen 80;
  server_name ycm.home;

  location / {
    proxy_pass http://127.0.0.1:8010;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # For streaming/log endpoints if needed later
    proxy_buffering off;
  }
}
